<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="390" viewBox="0 0 1120 390" role="img" aria-label="SkillRobust pipeline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f2e8"/>
      <stop offset="55%" stop-color="#eef6f0"/>
      <stop offset="100%" stop-color="#e8f0f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#17202a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#39424e"/>
    </marker>
    <style>
      .title{font-family:Georgia,serif;font-size:30px;font-weight:700;fill:#18202a}
      .subtitle{font-family:Arial,sans-serif;font-size:15px;fill:#506070}
      .box-title{font-family:Arial,sans-serif;font-size:18px;font-weight:700;fill:#19212b}
      .box-text{font-family:Arial,sans-serif;font-size:13px;fill:#536170}
      .tag{font-family:Arial,sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;fill:#ffffff}
      .label{font-family:Arial,sans-serif;font-size:12px;fill:#6a7480}
    </style>
  </defs>
  <rect width="1120" height="390" rx="24" fill="url(#bg)"/>
  <text x="48" y="58" class="title">SkillGuard-Robust: package-level pre-load auditing</text>
  <text x="50" y="84" class="subtitle">A staged decision architecture for cross-file Agent Skill packages under semantic rewrite pressure.</text>

  <g filter="url(#shadow)">
    <rect x="44" y="135" width="180" height="130" rx="18" fill="#ffffff"/>
    <rect x="64" y="112" width="118" height="28" rx="14" fill="#2f4858"/>
    <text x="84" y="131" class="tag">INPUT</text>
    <text x="70" y="168" class="box-title">Skill Package</text>
    <text x="70" y="196" class="box-text">SKILL.md</text>
    <text x="70" y="216" class="box-text">scripts / references</text>
    <text x="70" y="236" class="box-text">templates / repo context</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="282" y="135" width="180" height="130" rx="18" fill="#ffffff"/>
    <rect x="302" y="112" width="122" height="28" rx="14" fill="#1f9d7a"/>
    <text x="325" y="131" class="tag">STAGE 1</text>
    <text x="306" y="168" class="box-title">Structure</text>
    <text x="306" y="196" class="box-text">Recover evidence spans</text>
    <text x="306" y="216" class="box-text">across files and roles</text>
    <text x="306" y="236" class="box-text">into typed risk signals</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="135" width="180" height="130" rx="18" fill="#ffffff"/>
    <rect x="540" y="112" width="122" height="28" rx="14" fill="#2c6fd6"/>
    <text x="563" y="131" class="tag">STAGE 2</text>
    <text x="544" y="168" class="box-title">Verify</text>
    <text x="544" y="196" class="box-text">Localize uncertain chains</text>
    <text x="544" y="216" class="box-text">and ask a replaceable</text>
    <text x="544" y="236" class="box-text">LLM verifier only there</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="758" y="135" width="180" height="130" rx="18" fill="#ffffff"/>
    <rect x="778" y="112" width="122" height="28" rx="14" fill="#db7c26"/>
    <text x="801" y="131" class="tag">STAGE 3</text>
    <text x="782" y="168" class="box-title">Arbitrate</text>
    <text x="782" y="196" class="box-text">Resolve suspicious vs.</text>
    <text x="782" y="216" class="box-text">malicious conflicts using</text>
    <text x="782" y="236" class="box-text">chain dominance rules</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="936" y="134" width="140" height="132" rx="18" fill="#16202a"/>
    <text x="964" y="168" class="box-title" fill="#ffffff">Consolidate</text>
    <text x="964" y="197" class="box-text" fill="#c9d4df">Anchor-rewrite</text>
    <text x="964" y="217" class="box-text" fill="#c9d4df">agreement and</text>
    <text x="964" y="237" class="box-text" fill="#c9d4df">final label</text>
  </g>

  <path d="M232 200H270" stroke="#39424e" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M470 200H508" stroke="#39424e" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M708 200H746" stroke="#39424e" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M946 200H930" stroke="#39424e" stroke-width="0"/>
  <path d="M946 200H944" stroke="#39424e" stroke-width="3" marker-end="url(#arrow)"/>

  <g>
    <rect x="318" y="310" width="160" height="34" rx="17" fill="#ffffff" opacity=".78"/>
    <text x="340" y="332" class="label">cross-file evidence</text>
    <rect x="492" y="310" width="160" height="34" rx="17" fill="#ffffff" opacity=".78"/>
    <text x="515" y="332" class="label">semantic uncertainty</text>
    <rect x="666" y="310" width="160" height="34" rx="17" fill="#ffffff" opacity=".78"/>
    <text x="693" y="332" class="label">chain conflicts</text>
    <rect x="840" y="310" width="160" height="34" rx="17" fill="#ffffff" opacity=".78"/>
    <text x="865" y="332" class="label">rewrite stability</text>
  </g>
</svg>
